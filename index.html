<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Go To Sleep</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #001f3f 0%, #003566 35%, #00a8cc 100%);
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
      color: white;
      position: relative;
    }

    .ocean {
      position: absolute;
      bottom: 0;
      width: 100%;
      height: 25%;
      background: linear-gradient(to top, #0077b6, #00b4d8);
      opacity: 0.9;
    }

    .container {
      text-align: center;
      padding: 3rem;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      animation: float 4s ease-in-out infinite;
      z-index: 2;
      max-width: 850px;
    }

    h1 {
      font-size: clamp(2.5rem, 6vw, 5rem);
      margin-bottom: 1rem;
      line-height: 1.1;
    }

    p {
      font-size: clamp(1rem, 2vw, 1.5rem);
      opacity: 0.95;
    }

    .moon {
      position: absolute;
      top: 80px;
      right: 120px;
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: #f8fafc;
      box-shadow: 0 0 50px rgba(255,255,255,0.5);
    }

    .star {
      position: absolute;
      width: 4px;
      height: 4px;
      background: white;
      border-radius: 50%;
      animation: twinkle 2s infinite ease-in-out alternate;
    }

    .dog {
      position: absolute;
      bottom: 60px;
      font-size: 4rem;
      animation: drift 6s ease-in-out infinite alternate;
      z-index: 3;
    }

    .dog.left {
      left: 8%;
    }

    .dog.right {
      right: 10%;
      animation-delay: 1s;
    }

    .bahamas-flag {
      position: absolute;
      top: 40px;
      left: 40px;
      width: 150px;
      height: 90px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      z-index: 3;
      background: linear-gradient(
        to bottom,
        #00abc9 0%,
        #00abc9 33.33%,
        #fcd116 33.33%,
        #fcd116 66.66%,
        #00abc9 66.66%,
        #00abc9 100%
      );
    }

    .bahamas-flag div {
      position: absolute;
    }

    .flag-top,
    .flag-middle,
    .flag-bottom {
      display: none;
    }

    .triangle {
      position: absolute;
      left: 0;
      top: 0;
      width: 0;
      height: 0;
      border-top: 45px solid transparent;
      border-bottom: 45px solid transparent;
      border-left: 0;
      border-right: 65px solid black;
      z-index: 4;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    @keyframes twinkle {
      from {
        opacity: 0.3;
        transform: scale(1);
      }
      to {
        opacity: 1;
        transform: scale(1.8);
      }
    }

    @keyframes drift {
      from {
        transform: translateX(-10px);
      }
      to {
        transform: translateX(10px);
      }
    }
  </style>
</head>
<body>
  <div class="moon"></div>

  <div class="star" style="top:15%; left:20%;"></div>
  <div class="star" style="top:25%; left:70%; animation-delay:0.5s;"></div>
  <div class="star" style="top:65%; left:15%; animation-delay:1s;"></div>
  <div class="star" style="top:40%; left:85%; animation-delay:1.5s;"></div>
  <div class="star" style="top:80%; left:60%; animation-delay:2s;"></div>

  <div class="dog left">🐶</div>
  <div class="dog right">🐕</div>

  <div class="container">
    <h1>Maurrisssssaaaaaa 😴</h1>
    <p>
      I een know what im doing, but im doing something... R.C 🌙🇧🇸
    </p>
  </div>

  <div class="ocean"></div>
</body>
</html>
